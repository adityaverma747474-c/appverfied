<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoEarno</title>
    <script>
        var PLAYSTORE_URL = 'https://play.google.com/store/apps/details?id=com.doearno.app';
        var PACKAGE_NAME = 'com.doearno.app';
        var path = window.location.pathname + window.location.search;
        var isAndroid = /android/i.test(navigator.userAgent);

        if (isAndroid && path !== '/') {
            // Try to open app first, fallback to Play Store
            var intentUrl = 'intent://' + window.location.host + path +
                '#Intent;scheme=https;package=' + PACKAGE_NAME +
                ';S.browser_fallback_url=' + encodeURIComponent(PLAYSTORE_URL) + ';end';
            window.location.replace(intentUrl);
        } else {
            // Directly go to Play Store
            window.location.replace(PLAYSTORE_URL);
        }
    </script>
</head>
<body style="background:#000;color:#fff;font-family:sans-serif;text-align:center;padding-top:40px;">
    <p>Redirecting to Play Store...</p>
</body>
</html>
