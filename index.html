<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doearno - Opening App...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6c63ff, #48cfad);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(108,99,255,0.4);
        }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 15px; margin-bottom: 32px; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(108,99,255,0.2);
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn {
            background: linear-gradient(135deg, #6c63ff, #48cfad);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(108,99,255,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,99,255,0.5); }
        .status { font-size: 13px; color: #888; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="logo">💰</div>
    <h1>DoEarno</h1>
    <p>Earn while you learn. Opening your task...</p>
    <div class="spinner" id="spinner"></div>
    <a id="playstoreBtn" class="btn" href="https://play.google.com/store/apps/details?id=com.doearno.app" style="display:none;">
        📲 Download from Play Store
    </a>
    <p class="status" id="statusText">Opening DoEarno App...</p>

    <script>
        var PLAYSTORE_URL = 'https://play.google.com/store/apps/details?id=com.doearno.app';
        var PACKAGE_NAME = 'com.doearno.app';

        // Get full path to pass to app
        var path = window.location.pathname + window.location.search;

        // Build deep link intent URL for Android
        var intentUrl = 'intent://' + window.location.host + path +
            '#Intent;scheme=https;package=' + PACKAGE_NAME +
            ';S.browser_fallback_url=' + encodeURIComponent(PLAYSTORE_URL) + ';end';

        var isAndroid = /android/i.test(navigator.userAgent);
        var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

        function goToPlayStore() {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('playstoreBtn').style.display = 'inline-block';
            document.getElementById('statusText').textContent = 'App not found. Download from Play Store!';
            window.location.href = PLAYSTORE_URL;
        }

        if (isAndroid) {
            // Try to open the app via intent URL
            document.getElementById('statusText').textContent = 'Opening DoEarno App...';
            window.location.href = intentUrl;

            // If app not installed, intent URL will fail silently
            // After 2.5 seconds, if still on page, redirect to Play Store
            setTimeout(goToPlayStore, 2500);
        } else {
            // Not Android - just go to Play Store or show info
            document.getElementById('statusText').textContent = 'Please open this link on your Android phone.';
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('playstoreBtn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
